<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تقويم - محول التاريخ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="lang-bar">
        <button id="langToggleBtn" class="lang-toggle-btn" type="button">EN</button>
      </div>

      <section class="tabs" role="tablist" aria-label="نمط التحويل">
        <button class="tab active" id="tab-g" role="tab" aria-selected="true" data-mode="gregorian">
          ميلادي
        </button>
        <button class="tab" id="tab-h" role="tab" aria-selected="false" data-mode="hijri">
          هجري
        </button>
      </section>

      <section class="picker-card">
        <div class="picker-grid">
          <div class="field">
            <label id="labelDay" for="daySelect">اليوم</label>
            <div id="dayWheel" class="wheel" data-field="day" aria-hidden="true"></div>
            <select id="daySelect" class="sr-only"></select>
          </div>
          <div class="field">
            <label id="labelMonth" for="monthSelect">الشهر</label>
            <div id="monthWheel" class="wheel" data-field="month" aria-hidden="true"></div>
            <select id="monthSelect" class="sr-only"></select>
          </div>
          <div class="field">
            <label id="labelYear" for="yearSelect">السنة</label>
            <div id="yearWheel" class="wheel" data-field="year" aria-hidden="true"></div>
            <select id="yearSelect" class="sr-only"></select>
          </div>
        </div>
      </section>

      <section class="result-card">
        <div class="result-header">
          <div id="calendarIcon" class="cal-icon" aria-label="اليوم">
            <div id="calendarIconMonth" class="cal-icon-top">---</div>
            <div id="calendarIconDay" class="cal-icon-day">--</div>
          </div>
          <div class="header-actions">
            <button id="todayBtn" class="today-btn" type="button">تحديث اليوم</button>
            <button id="editBtn" class="edit-btn">تعديل</button>
          </div>
        </div>
        <h2 id="weekdayText">-</h2>
        <p id="fullDateText" class="big-date">-</p>
        <p id="monthNameText" class="month-name">-</p>
        <p id="offsetText" class="offset-text">0 يوم</p>
        <div class="clock-section">
          <div class="clock-display">
            <span id="clockTime" class="clock-time">--:--:--</span>
            <span id="clockAmPm" class="clock-ampm"></span>
          </div>
          <button id="clockToggleBtn" class="clock-toggle-btn" type="button">١٢ ساعة</button>
        </div>
      </section>

      <footer class="owner-signature" aria-label="المالك">
        <span class="owner-label">المالك</span>
        <span class="owner-name">عبدالمحسن</span>
      </footer>
    </main>

    <dialog id="editDialog">
      <form method="dialog" class="dialog-content">
        <h3 id="dialogTitle">تعديل التاريخ</h3>

        <label id="dialogOffsetLabel" class="dialog-label" for="offsetInput">إضافة / إنقاص أيام</label>
        <input id="offsetInput" type="number" value="0" min="-5000" max="5000" />

        <p id="dialogMonthLengthLabel" class="dialog-label">طول الشهر الهجري</p>
        <div class="radio-row">
          <label id="monthLen30Label"><input type="radio" name="monthLength" value="30" checked /> <span>30 يوم</span></label>
          <label id="monthLen29Label"><input type="radio" name="monthLength" value="29" /> <span>29 يوم</span></label>
        </div>

        <div class="dialog-actions">
          <button type="button" id="cancelDialogBtn" class="ghost-btn">إلغاء</button>
          <button type="submit" id="saveDialogBtn" class="solid-btn">حفظ</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
